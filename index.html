<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBW Forklift Inspections</title>
<link rel="stylesheet" href="css/main.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page">
<div class="login-bg">
  <div class="login-grid"></div>
</div>
<div class="login-container">
  <div class="login-brand">
    <div class="brand-badge">BBW</div>
    <div class="brand-text">
      <span class="brand-main">Brunswick Bierworks</span>
      <span class="brand-sub">Equipment Inspection System</span>
    </div>
  </div>

  <div class="login-card">
    <h1>Dashboard Login</h1>
    <p class="login-hint">Staff access to inspection records</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@brunswickbierworks.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div id="loginError" class="error-msg hidden"></div>

    <button class="btn-primary" onclick="handleLogin()">
      <span>Sign In</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <div class="login-footer">
      <a href="#" onclick="handleForgotPassword()">Forgot password?</a>
      <span>·</span>
      <a href="#" onclick="showRegister()">Request access</a>
    </div>
  </div>

  <div class="login-note">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    Inspectors: scan the QR code on the equipment to start an inspection
  </div>
</div>

<!-- Register Modal -->
<div id="registerModal" class="modal hidden">
  <div class="modal-backdrop" onclick="hideRegister()"></div>
  <div class="modal-card">
    <h2>Request Dashboard Access</h2>
    <p>An admin will approve your account.</p>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="regName" placeholder="Your name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Min 8 characters">
    </div>
    <div id="regError" class="error-msg hidden"></div>
    <div id="regSuccess" class="success-msg hidden"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="hideRegister()">Cancel</button>
      <button class="btn-primary" onclick="handleRegister()">Request Access</button>
    </div>
  </div>
</div>

<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
